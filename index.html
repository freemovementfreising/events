<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Movement Collective Freising</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <img src="FMLogo.jpg" alt="Free Movement Collective Logo" class="logo">
    <h1>Free Movement Collective Freising</h1>
    <p class="subtitle">We dance freely — and you're invited.</p>
    <button id="guidelines-btn" class="guidelines-btn">Read our Guidelines</button>
  </header>

  <main>
    <div class="tabs">
      <button class="tab-btn active" data-tab="upcoming">Upcoming</button>
      <button class="tab-btn" data-tab="past">Past</button>
    </div>

    <div id="tab-upcoming" class="tab-content active">
      <section class="calendar-section">
        <div class="calendar-nav">
          <button id="prev-month" aria-label="Previous month">&#8249;</button>
          <h2 id="calendar-month-label"></h2>
          <button id="next-month" aria-label="Next month">&#8250;</button>
        </div>
        <div id="calendar-grid"></div>
      </section>

      <section class="list-section">
        <h2>Events</h2>
        <div id="event-list"></div>
      </section>
    </div>

    <div id="tab-past" class="tab-content">
      <section class="list-section">
        <h2>Past Events</h2>
        <div id="past-event-list"></div>
      </section>
    </div>
  </main>

  <!-- Guidelines modal -->
  <div id="guidelines-modal" class="modal" role="dialog" aria-modal="true" aria-label="Guidelines" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <button class="modal-close" aria-label="Close">&times;</button>
      <div id="guidelines-content" class="modal-body"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
